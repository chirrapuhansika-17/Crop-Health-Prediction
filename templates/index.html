<!DOCTYPE html>
<html>
<head>
    <title>Smart Farming AI</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            text-align: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            margin-top: 80px;
            box-shadow: 0px 0px 20px gray;
        }

        input, button {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🌱 Smart Farming AI</h2>

    <form action="/predict" method="post">
        <input type="number" name="temperature" placeholder="Temperature"><br>
        <input type="number" name="humidity" placeholder="Humidity"><br>
        <input type="number" name="soil" placeholder="Soil Moisture"><br>

        <button type="submit">Analyze</button>
    </form>

    <h3>{{ prediction }}</h3>
    <p>{{ suggestion }}</p>
</div>

</body>
</html>
